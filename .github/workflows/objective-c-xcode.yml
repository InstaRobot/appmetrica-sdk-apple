name: Xcode - Build and Test SPM Package

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_and_test_ios:
    name: iOS - Build and Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare Environment Variables
        run: |
          echo "SCHEME=AppMetrica-Package" >> $GITHUB_ENV
          echo "DERIVED_DATA_PATH=$RUNNER_TEMP/DerivedData" >> $GITHUB_ENV

      - name: Select Simulator and OS
        run: |
          LATEST_IOS_VERSION=$(xcrun simctl list runtimes -j | ruby -e 'require "json"; d=JSON.parse(STDIN.read); r=(d["runtimes"]||[]).select{|x| x["platform"]=="iOS"&&x["isAvailable"]}.map{|x| x["version"]}.sort; if r.empty?; warn "::error::No available iOS simulator runtime (simctl list runtimes). Install or enable an iOS runtime on the runner."; exit 1; end; puts r.last')
          DEVICE=$(xcrun simctl list devices available -j | ruby -e 'require "json"; v=ARGV[0].gsub(".","-"); d=JSON.parse(STDIN.read); k=d["devices"].keys.find{|k| k.include?("iOS-#{v}")}; abort "::error::No iOS #{ARGV[0]} runtime found" if k.nil?; dev=d["devices"][k].select{|x| x["isAvailable"]&&x["name"].include?("iPhone")}; abort "::error::No iPhone simulator for iOS #{ARGV[0]}" if dev.empty?; puts dev.first["name"]' "$LATEST_IOS_VERSION")
          echo "Selected simulator: $DEVICE"
          echo "Selected OS: $LATEST_IOS_VERSION"
          echo "DEVICE=$DEVICE" >> $GITHUB_ENV
          echo "LATEST_IOS_VERSION=$LATEST_IOS_VERSION" >> $GITHUB_ENV

      - name: Setup Keychain
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security list-keychains -d user -s build.keychain login.keychain-db

      - name: Build
        run: |
          xcodebuild build -scheme "$SCHEME" -sdk iphonesimulator -destination "platform=iOS Simulator,name=$DEVICE,OS=$LATEST_IOS_VERSION" -derivedDataPath $DERIVED_DATA_PATH | xcpretty && exit ${PIPESTATUS[0]}

      - name: Test
        env:
          OS_ACTIVITY_MODE: disable
        run: |
          set -o pipefail
          xcodebuild test -scheme "$SCHEME" -sdk iphonesimulator -destination "platform=iOS Simulator,name=$DEVICE,OS=$LATEST_IOS_VERSION" -derivedDataPath $DERIVED_DATA_PATH -parallel-testing-enabled NO 2>&1 | tee "$RUNNER_TEMP/test-ios.log"

  build_macos:
    name: macOS - Build and Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare Environment Variables
        run: |
          echo "SCHEME=AppMetrica-Package" >> $GITHUB_ENV
          echo "DERIVED_DATA_PATH=$RUNNER_TEMP/DerivedData" >> $GITHUB_ENV

      - name: Build for macOS
        run: |
          xcodebuild build -scheme "$SCHEME" -destination "platform=macOS" -derivedDataPath $DERIVED_DATA_PATH | xcpretty && exit ${PIPESTATUS[0]}

      - name: Test on macOS
        env:
          OS_ACTIVITY_MODE: disable
        run: |
          set -o pipefail
          xcodebuild test -scheme "$SCHEME" -destination "platform=macOS" -derivedDataPath $DERIVED_DATA_PATH -parallel-testing-enabled NO 2>&1 | tee "$RUNNER_TEMP/test-macos.log"

